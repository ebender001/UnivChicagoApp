<header class="site-header">
  <div class="container header-inner">
    <div class="brand-group">
      <a class="brand" href="index.html">BeFitMe</a>
      <div class="header-profile" data-header-profile hidden>
        <div class="header-profile-specialty" data-header-specialty hidden></div>
        <div class="header-profile-institution" data-header-institution hidden></div>
      </div>
    </div>
    <div class="header-status" id="connectivity-status" aria-live="polite">Checking connectivity...</div>
    <div class="header-auth" data-header-auth>
      <button type="button" class="btn header-auth-button" data-auth-button>Login</button>
      <div class="header-account-menu-wrap" data-account-menu hidden>
        <button type="button" class="header-account-toggle" data-account-toggle aria-haspopup="true" aria-expanded="false">
          <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
            <path d="M20 21a8 8 0 0 0-16 0"></path>
            <circle cx="12" cy="8" r="4"></circle>
          </svg>
          <span data-account-name></span>
        </button>
        <div class="header-account-dropdown" data-account-dropdown hidden>
          <button type="button" class="header-account-dropdown-item" data-account-my-info>My Info</button>
          <button type="button" class="header-account-dropdown-item" data-account-logout>Log Out</button>
        </div>
      </div>
    </div>
  </div>
</header>
